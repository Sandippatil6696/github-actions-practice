name: CICD workflow

on:
    # push:
    #     branches: [main]
    #     paths:
    #         - 'index.html'
    workflow_dispatch:
        inputs:
            environments:
                default: 'dev'
                required: true
                type: choice
                options:
                    - dev
                    - staging
                    - prod

jobs:
    code:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code 
              run : echo "git clone" 
    build:
        runs-on: ubuntu-latest
        needs: code
        steps:
            - name : build docker image 
              run: echo "docker build"
    test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name : run unit test
              run: echo "testing"
    deploy:
        runs-on: ubuntu-latest
        if: ${{github.event.inputs.environments== 'dev'}}
        needs: test
        steps:
            - name : deploy to server 
              run: echo "deploying"